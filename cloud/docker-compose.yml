version: "3.9"

services:
  cloud-db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cloud-db-data:/var/lib/postgresql/data
    networks:
      - app-net

  cloud-backend:
    env_file: .env
    build: ./backend
    depends_on:
      - cloud-db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cloud-db:5432/${POSTGRES_DB}
      APP_NAME: cloud-backend
      APP_ENV: development
      # Pi PWA on :5174 when testing both UIs on one machine.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
    ports:
      - "8000:8000"
    networks:
      - app-net

  cloud-frontend:
    build: ./frontend
    depends_on:
      - cloud-backend
    ports:
      - "5173:5173"
    networks:
      - app-net

volumes:
  cloud-db-data: {}

networks:
  app-net:
    driver: bridge
