schema: spec-driven

context: |
  Vendiqo Order Platform — multi-tenant event/venue POS monorepo.
  Tech stack: FastAPI + PostgreSQL (cloud backend), FastAPI + SQLite (pi backend),
  Vue 3 / Vite / TypeScript (cloud frontend), Vue 3 PWA (pi frontend).
  Conventions: branch from main, land via PR; write tests before code; run
  ./scripts/lint.sh before committing; regenerate OpenAPI types when cloud
  backend schemas change (see AGENTS.md).

