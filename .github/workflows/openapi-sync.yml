name: OpenAPI sync

on:
  push:
    branches: [main, master]
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/openapi.json"
      - "cloud/frontend/src/types/api.generated.ts"
      - "pi/backend/**"
      - "pi/frontend/openapi.json"
      - "pi/frontend/src/types/api.generated.ts"
      - ".github/workflows/openapi-sync.yml"
  pull_request:
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/openapi.json"
      - "cloud/frontend/src/types/api.generated.ts"
      - "pi/backend/**"
      - "pi/frontend/openapi.json"
      - "pi/frontend/src/types/api.generated.ts"
      - ".github/workflows/openapi-sync.yml"

jobs:
  openapi-drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [cloud, pi]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shared package
        run: pip install -e packages/vendiqo_shared

      - name: Install backend dependencies (${{ matrix.stack }})
        working-directory: ${{ matrix.stack }}/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export OpenAPI schema (${{ matrix.stack }})
        working-directory: ${{ matrix.stack }}/backend
        run: python scripts/export_openapi.py

      - name: Verify openapi.json matches committed snapshot (${{ matrix.stack }})
        run: git diff --exit-code ${{ matrix.stack }}/frontend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.stack }}/frontend/package-lock.json

      - name: Regenerate TypeScript API types (${{ matrix.stack }})
        working-directory: ${{ matrix.stack }}/frontend
        run: |
          npm ci
          npm run generate:api-types

      - name: Verify api.generated.ts matches committed snapshot (${{ matrix.stack }})
        run: git diff --exit-code ${{ matrix.stack }}/frontend/src/types/api.generated.ts
