name: OpenAPI sync

on:
  push:
    branches: [main, master]
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/openapi.json"
      - "cloud/frontend/src/types/api.generated.ts"
      - "pi/backend/**"
      - "pi/frontend/openapi.json"
      - "pi/frontend/src/types/api.generated.ts"
      - "packages/vendiqo_shared/**"
      - "cloud/shared/**"
      - ".github/filters.yaml"
      - ".github/workflows/openapi-sync.yml"
  pull_request:
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/openapi.json"
      - "cloud/frontend/src/types/api.generated.ts"
      - "pi/backend/**"
      - "pi/frontend/openapi.json"
      - "pi/frontend/src/types/api.generated.ts"
      - "packages/vendiqo_shared/**"
      - "cloud/shared/**"
      - ".github/filters.yaml"
      - ".github/workflows/openapi-sync.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cloud: ${{ steps.filter.outputs.cloud-backend == 'true' || steps.filter.outputs.shared-python == 'true' || steps.filter.outputs.cloud-shared == 'true' || steps.filter.outputs.cloud-openapi == 'true' }}
      pi: ${{ steps.filter.outputs.pi-backend == 'true' || steps.filter.outputs.shared-python == 'true' || steps.filter.outputs.pi-openapi == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters.yaml

  openapi-drift-cloud:
    needs: changes
    if: needs.changes.outputs.cloud == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shared package
        run: pip install -e packages/vendiqo_shared

      - name: Install backend dependencies (cloud)
        working-directory: cloud/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export OpenAPI schema (cloud)
        working-directory: cloud/backend
        run: python scripts/export_openapi.py

      - name: Verify openapi.json matches committed snapshot (cloud)
        run: git diff --exit-code cloud/frontend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloud/frontend/package-lock.json

      - name: Regenerate TypeScript API types (cloud)
        working-directory: cloud/frontend
        run: |
          npm ci
          npm run generate:api-types

      - name: Verify api.generated.ts matches committed snapshot (cloud)
        run: git diff --exit-code cloud/frontend/src/types/api.generated.ts

  openapi-drift-pi:
    needs: changes
    if: needs.changes.outputs.pi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shared package
        run: pip install -e packages/vendiqo_shared

      - name: Install backend dependencies (pi)
        working-directory: pi/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export OpenAPI schema (pi)
        working-directory: pi/backend
        run: python scripts/export_openapi.py

      - name: Verify openapi.json matches committed snapshot (pi)
        run: git diff --exit-code pi/frontend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pi/frontend/package-lock.json

      - name: Regenerate TypeScript API types (pi)
        working-directory: pi/frontend
        run: |
          npm ci
          npm run generate:api-types

      - name: Verify api.generated.ts matches committed snapshot (pi)
        run: git diff --exit-code pi/frontend/src/types/api.generated.ts
