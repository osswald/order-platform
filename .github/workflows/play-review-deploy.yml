name: Play review deploy

on:
  workflow_run:
    workflows: [Pi Docker images]
    types: [completed]
    branches: [main, master]

permissions: {}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PLAY_REVIEW_DEPLOY_HOST }}
          username: ${{ secrets.PLAY_REVIEW_DEPLOY_USER }}
          key: ${{ secrets.PLAY_REVIEW_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.PLAY_REVIEW_DEPLOY_PATH }}"
            git fetch --ff-only origin main
            # Remove untracked bootstrap copies that block merge; ignored
            # files such as cloud/play-review/.env are kept.
            git clean -fd
            git merge --ff-only origin/main
            ./scripts/deploy-play-review.sh
