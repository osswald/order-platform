name: Android release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read VERSION
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: pi/frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install pi frontend dependencies
        working-directory: pi/frontend
        run: ../../scripts/npm.sh ci

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 secret not set" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/order-platform-upload.jks
          printf '%s\n' \
            "storeFile=order-platform-upload.jks" \
            "storePassword=${ANDROID_KEYSTORE_PASSWORD}" \
            "keyAlias=${ANDROID_KEY_ALIAS}" \
            "keyPassword=${ANDROID_KEY_PASSWORD}" \
            > android/keystore.properties

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play-action@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ch.vendiqo.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed
