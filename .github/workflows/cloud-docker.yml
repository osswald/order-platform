# Build cloud backend and frontend for linux/amd64 and push to GitHub Container Registry.
name: Cloud Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/**"
      - "website/**"
      - "cloud/docker-compose.prod.yml"
      - "cloud/Caddyfile"
      - "VERSION"
      - "scripts/vite-version-env.mjs"
      - ".github/workflows/cloud-docker.yml"
  pull_request:
    paths:
      - "cloud/backend/**"
      - "cloud/frontend/**"
      - "website/**"
      - "cloud/docker-compose.prod.yml"
      - "cloud/Caddyfile"
      - "VERSION"
      - "scripts/vite-version-env.mjs"
      - ".github/workflows/cloud-docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cloud/backend/Dockerfile.prod
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:cloud-backend-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:cloud-backend-${{ github.sha }}

      - name: Read app version
        id: version
        run: |
          echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cloud/frontend/Dockerfile.prod
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_API_BASE_URL=https://api.vendiqo.ch
            VITE_APP_VERSION=${{ steps.version.outputs.value }}
            VITE_BUILD_TIME=${{ steps.version.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:cloud-frontend-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:cloud-frontend-${{ github.sha }}

      - name: Build and push website
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./website/Dockerfile.prod
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:website-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:website-${{ github.sha }}
