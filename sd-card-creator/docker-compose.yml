# One-shot: from this directory run `docker compose up` (see README.md).
# Loads defaults from .env.example; optional .env overrides (copy from .env.example).
services:
  image-build:
    build: .
    privileged: true
    env_file:
      - .env.example
    volumes:
      - /dev:/dev
      - ..:/workspace:ro
      - ./input:/input:rw
      - ./output:/out
    restart: "no"
