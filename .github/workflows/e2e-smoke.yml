name: E2E smoke

on:
  push:
    branches: [main, master]
    paths:
      - "cloud/**"
      - "pi/**"
      - "e2e/**"
      - ".github/workflows/e2e-smoke.yml"
  pull_request:
    paths:
      - "cloud/**"
      - "pi/**"
      - "e2e/**"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Prepare cloud env
        working-directory: cloud
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          APP_ENV=development
          POSTGRES_PASSWORD=devpass123
          SECRET_KEY=devsecretkey123456789
          ADMIN_EMAIL=admin@vendiqo.local
          ADMIN_PASSWORD=admin123
          ENABLE_OPENAPI=true
          REFRESH_COOKIE_SECURE=false
          ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
          EOF

      - name: Start cloud stack
        working-directory: cloud
        run: docker compose up -d --build

      - name: Prepare pi env
        working-directory: pi
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          SYNC_ENABLED=0
          VITE_API_BASE=http://localhost:8001
          EOF

      - name: Start pi stack
        working-directory: pi
        run: docker compose up -d --build

      - name: Wait for backends
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health >/dev/null && curl -sf http://localhost:8001/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backends did not become healthy in time"
          echo "--- cloud compose ps ---"
          docker compose -f cloud/docker-compose.yml ps -a || true
          echo "--- pi compose ps ---"
          docker compose -f pi/docker-compose.yml ps -a || true
          echo "--- cloud-backend logs ---"
          docker compose -f cloud/docker-compose.yml logs --tail=200 cloud-backend || true
          echo "--- pi-backend logs ---"
          docker compose -f pi/docker-compose.yml logs --tail=200 pi-backend || true
          exit 1

      - name: Seed Pi bundle for smoke test
        working-directory: pi
        run: docker compose exec -T -w /app -e PYTHONPATH=/app pi-backend python3 scripts/seed_e2e_bundle.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: e2e
        env:
          CLOUD_BASE_URL: http://localhost:5173
          PI_BASE_URL: http://localhost:5174
          CLOUD_ADMIN_EMAIL: admin@vendiqo.local
          CLOUD_ADMIN_PASSWORD: admin123
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
