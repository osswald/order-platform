name: Lint

on:
  push:
    branches: [main, master]
    paths:
      - "cloud/backend/**"
      - "pi/backend/**"
      - "ruff.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "cloud/backend/**"
      - "pi/backend/**"
      - "ruff.toml"
      - ".github/workflows/lint.yml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [cloud, pi]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Ruff check (${{ matrix.backend }})
        run: ruff check ${{ matrix.backend }}/backend/app ${{ matrix.backend }}/backend/tests
