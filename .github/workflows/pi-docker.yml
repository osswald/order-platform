# Build Pi edge images for linux/arm64 (Raspberry Pi) and linux/amd64 (hosted cloud Pi).
# Configure repository variable IMAGE_NAME if you want a custom image name.
name: Pi Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "pi/backend/**"
      - "pi/frontend/**"
      - "VERSION"
      - "scripts/vite-version-env.mjs"
      - ".github/workflows/pi-docker.yml"
  pull_request:
    paths:
      - "pi/backend/**"
      - "pi/frontend/**"
      - "VERSION"
      - "scripts/vite-version-env.mjs"
      - ".github/workflows/pi-docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve app version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "build_time=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: image_tags
        env:
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.value }}
          PUBLISH: ${{ github.event_name != 'pull_request' }}
        run: |
          repo="${{ env.REGISTRY }}/${{ github.repository }}"
          backend_tags="${repo}:pi-backend-latest"$'\n'"${repo}:pi-backend-amd64-latest"$'\n'"${repo}:pi-backend-${SHA}"
          frontend_tags="${repo}:pi-frontend-latest"$'\n'"${repo}:pi-frontend-amd64-latest"$'\n'"${repo}:pi-frontend-${SHA}"
          if [[ "$PUBLISH" == "true" ]]; then
            backend_tags+=$'\n'"${repo}:pi-backend-${VERSION}"$'\n'"${repo}:pi-backend-amd64-${VERSION}"
            frontend_tags+=$'\n'"${repo}:pi-frontend-${VERSION}"$'\n'"${repo}:pi-frontend-amd64-${VERSION}"
          fi
          {
            echo "backend<<EOF"
            printf '%s\n' "$backend_tags"
            echo "EOF"
            echo "frontend<<EOF"
            printf '%s\n' "$frontend_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./pi/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image_tags.outputs.backend }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./pi/frontend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.value }}
            VITE_BUILD_TIME=${{ steps.version.outputs.build_time }}
          tags: |
            ${{ steps.image_tags.outputs.frontend }}
