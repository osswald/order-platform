services:
  cloud-db:
    image: postgres:15
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH:-cloud-db-data}:/var/lib/postgresql/data
    networks:
      - app-net

  cloud-backend:
    restart: unless-stopped
    env_file: .env
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    depends_on:
      - cloud-db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cloud-db:5432/${POSTGRES_DB}
      APP_NAME: cloud-backend
      APP_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-net

  cloud-frontend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: cloud/frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.vendiqo.ch}
    depends_on:
      - cloud-backend
    networks:
      - app-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - cloud-frontend
      - cloud-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-net

volumes:
  cloud-db-data: {}
  caddy-data: {}
  caddy-config: {}

networks:
  app-net:
    driver: bridge
