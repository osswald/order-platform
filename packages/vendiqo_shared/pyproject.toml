[project]
name = "vendiqo-shared"
version = "0.1.0"
description = "Shared pure functions for Vendiqo cloud and pi backends"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["vendiqo_shared*"]
