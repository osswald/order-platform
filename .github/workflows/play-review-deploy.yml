name: Play review deploy

on:
  workflow_run:
    workflows: [Pi Docker images]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Play review workflow guards
        run: ./scripts/test-play-review-workflow-guards.sh

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PLAY_REVIEW_DEPLOY_HOST }}
          username: ${{ secrets.PLAY_REVIEW_DEPLOY_USER }}
          key: ${{ secrets.PLAY_REVIEW_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.PLAY_REVIEW_DEPLOY_PATH }}"
            # Plain fetch: older VPS git has no fetch --ff-only; merge enforces FF.
            git fetch origin main
            # Remove untracked bootstrap copies that block merge; ignored
            # files such as cloud/play-review/.env are kept.
            git clean -fd
            git merge --ff-only origin/main
            ./scripts/deploy-play-review.sh
