name: Backend tests

on:
  push:
    branches: [main, master]
    paths:
      - "cloud/backend/**"
      - "pi/backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "cloud/backend/**"
      - "pi/backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [cloud, pi]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies (${{ matrix.backend }})
        working-directory: ${{ matrix.backend }}/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage (${{ matrix.backend }})
        working-directory: ${{ matrix.backend }}/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/${{ matrix.backend }}/backend
        run: python -m pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70 -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.backend }}
          path: ${{ matrix.backend }}/backend/coverage.xml
