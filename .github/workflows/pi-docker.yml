# Build Pi edge backend for linux/arm64 and push to GitHub Container Registry.
# Configure repository variable IMAGE_NAME if you want a custom image name.
name: Pi Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "pi/backend/**"
      - ".github/workflows/pi-docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./pi/backend
          file: ./pi/backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-backend-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-backend-${{ github.sha }}
