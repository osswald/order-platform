# Build Pi edge backend for linux/arm64 and push to GitHub Container Registry.
# Configure repository variable IMAGE_NAME if you want a custom image name.
name: Pi Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "pi/backend/**"
      - "pi/frontend/**"
      - "VERSION"
      - "scripts/vite-version-env.mjs"
      - ".github/workflows/pi-docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./pi/backend
          file: ./pi/backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-backend-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-backend-${{ github.sha }}

      - name: Read app version
        id: version
        run: |
          echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(git log -1 --format=%cd --date=format:%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./pi/frontend/Dockerfile.prod
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.value }}
            VITE_BUILD_TIME=${{ steps.version.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-frontend-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:pi-frontend-${{ github.sha }}
